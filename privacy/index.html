  <h1>Privacy Policy</h1>
  <p class="updated">Last updated: March 2026</p>

  <p>Strata is a personal Spotify tool that organizes your Liked Songs into time-based playlists. This page explains what data Strata accesses, how it's used, and what we don't do with it.</p>

  <div class="divider"></div>

  <h2>What Strata accesses</h2>
  <p>When you connect your Spotify account, Strata requests the following permissions:</p>
  <ul>
    <li><strong style="color:#f0ebe0;">user-library-read</strong> — to read your Liked Songs library</li>
    <li><strong style="color:#f0ebe0;">playlist-read-private</strong> — to check which Strata playlists already exist in your account</li>
    <li><strong style="color:#f0ebe0;">playlist-modify-public</strong> — to create and update your time-based playlists</li>
    <li><strong style="color:#f0ebe0;">ugc-image-upload</strong> — to optionally set cover images on your playlists</li>
  </ul>

  <h2>How your data is used</h2>
  <p>Strata processes your Liked Songs entirely in your browser. Your song data, listening history, and Spotify credentials are never sent to any external server operated by Strata.</p>
  <p>The Spotify access token is stored locally in your browser session and is used only to communicate directly with Spotify's API on your behalf. It is never transmitted to any third party.</p>

  <h2>What we don't do</h2>
  <ul>
    <li>We do not store your Spotify data on any server</li>
    <li>We do not sell, share, or monetize your data in any form</li>
    <li>We do not track your listening habits or usage patterns</li>
    <li>We do not modify, delete, or access any playlists other than those created by Strata</li>
    <li>We do not retain your access token beyond your browser session</li>
  </ul>

  <h2>Third-party services</h2>
  <p>Strata uses the <a href="https://developer.spotify.com" target="_blank">Spotify Web API</a> to read your library and manage playlists. Your use of Spotify is governed by <a href="https://www.spotify.com/legal/privacy-policy/" target="_blank">Spotify's own Privacy Policy</a>. Strata is not affiliated with or endorsed by Spotify.</p>

  <h2>Cookies &amp; local storage</h2>
  <p>Strata stores the following data in your browser's local storage:</p>
  <ul>
    <li>Your Spotify access token (temporary, expires automatically)</li>
    <li>Your birthday, if entered, for age context in the track lookup feature</li>
  </ul>
  <p>No cookies are used. No data is stored on external servers.</p>

  <h2>Children's privacy</h2>
  <p>Strata is not directed at children under the age of 13 and does not knowingly collect information from children.</p>

  <h2>Changes to this policy</h2>
  <p>If this policy changes, the updated version will be posted at this URL with a new "Last updated" date.</p>
