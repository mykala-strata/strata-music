<script>
var BIRTHDAY = localStorage.getItem('strata_birthday') || '1996-11-20';

function saveBirthday(val) {
  BIRTHDAY = val;
  localStorage.setItem('strata_birthday', val);
}

function getBdayParts() {
  var p = BIRTHDAY.split('-');
  return { year: parseInt(p[0]), month: parseInt(p[1]), day: parseInt(p[2]) };
}

function calcAgeText(listenDateStr, releaseYear, releaseMonth) {
  var bd = getBdayParts();
  var ld = new Date(listenDateStr);
  var listenYear = ld.getFullYear();
  var listenMonth = ld.getMonth() + 1;
  var listenDay = ld.getDate();

  var ageAtListen = listenYear - bd.year;
  if (listenMonth < bd.month || (listenMonth === bd.month && listenDay < bd.day)) ageAtListen--;

  releaseYear = parseInt(releaseYear);
  releaseMonth = parseInt(releaseMonth);

  if (!releaseYear || isNaN(releaseYear)) return 'Your first listen was at age ' + ageAtListen + '.';

  var ageAtRelease = releaseYear - bd.year;
  if (releaseMonth < bd.month) ageAtRelease--;

  var totalMonths = Math.max(0, (listenYear - releaseYear) * 12 + (listenMonth - releaseMonth));
  var gapYears = Math.floor(totalMonths / 12);
  var gapMonths = totalMonths % 12;

  function gapStr(y, m) {
    if (y === 0 && m === 0) return 'the day it came out';
    if (y === 0) return m + ' month' + (m===1?'':'s') + ' later';
    if (y === 1 && m === 6) return 'one and a half years later';
    if (y >= 1) return y + ' year' + (y===1?'':'s') + ' later';
    return m + ' month' + (m===1?'':'s') + ' later';
  }

  if (releaseYear < bd.year || (releaseYear === bd.year && releaseMonth < bd.month)) {
    var yearsBeforeBorn = bd.year - releaseYear;
    var yearsAfterRelease = listenYear - releaseYear;
    return 'This song was released ' + yearsBeforeBorn + ' year' + (yearsBeforeBorn===1?'':'s') + ' before you were born. Your first listen was ' + yearsAfterRelease + ' years after its release at age ' + ageAtListen + '.';
  }

  var gap = gapStr(gapYears, gapMonths);
  if (gap === 'the day it came out') return 'You were ' + ageAtListen + ' when this song was released. Your first listen was the day it came out.';
  if (ageAtRelease === ageAtListen) return 'You were ' + ageAtRelease + ' when this song was released. Your first listen was ' + gap + '.';
  return 'You were ' + ageAtRelease + ' when this song was released. Your first listen was ' + gap + ' at age ' + ageAtListen + '.';
}

function buildGrid() {
  var total = PLAYLISTS.reduce(function(s,p){ return s+p.count; }, 0);
  document.getElementById('grid-meta').textContent = PLAYLISTS.length + ' playlists · ' + total + ' first listens';
  var html = '<div class="pl-grid">';
  PLAYLISTS.forEach(function(p, i) {
    html += '<div class="pl-card" onclick="showPlaylist(' + i + ')">';
    html += '<div class="pl-card-label">' + p.label.charAt(0).toUpperCase() + p.label.slice(1) + '</div>';
    html += '<div class="pl-card-count">' + p.count + ' songs</div>';
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('grid-content').innerHTML = html;
}

function showGrid() {
  document.getElementById('grid-view').style.display = 'block';
  document.getElementById('pl-view').style.display = 'none';

function showPlaylist(idx) {
  var p = PLAYLISTS[idx];
  document.getElementById('grid-view').style.display = 'none';
  document.getElementById('pl-view').style.display = 'block';
  document.getElementById('pl-eyebrow').textContent = p.year;
  document.getElementById('pl-name').textContent = p.label.charAt(0).toUpperCase() + p.label.slice(1);
  document.getElementById('pl-meta').textContent = p.count + ' songs';
  document.getElementById('search').value = '';
  document.getElementById('no-results').style.display = 'none';

  var html = '';
  var lastDate = '';
  p.tracks.forEach(function(t, i) {
    var dateStr = t.date;
    var dateParts = dateStr.split(' ');
    var monthName = dateParts[0];
    var day = parseInt(dateParts[1]);
    var year = parseInt(dateParts[2]);
    var listenMonth = new Date(dateStr).getMonth() + 1;
    var bd = getBdayParts();
    var isBday = (listenMonth === bd.month && day === bd.day);

    if (dateStr !== lastDate) {
      html += '<div class="day-hdr' + (isBday ? ' bday' : '') + '">' + dateStr + (isBday ? ' · your birthday' : '') + '</div>';
      lastDate = dateStr;
    }

    var spUrl = 'https://open.spotify.com/search/' + encodeURIComponent(t.title + ' ' + t.artist);
    var ytUrl = 'https://youtube.com/results?search_query=' + t.ytQ;

    html += '<div class="track" data-title="' + t.title.toLowerCase().replace(/"/g,'') + '" data-artist="' + t.artist.toLowerCase().replace(/"/g,'') + '">';
    html += '<img class="art" src="" data-sp="' + spUrl + '">';
    html += '<div class="ti">';
    html += '<div class="tt">' + t.title + '</div>';
    html += '<div class="ta">' + t.artist + '</div>';
    html += '<div class="tc" data-listen="' + t.date + '">...</div>';
    html += '</div>';
    html += '<div class="tn">#' + (i+1) + '</div>';
    html += '<div class="icons" data-sp="' + spUrl + '" data-yt="' + ytUrl + '">' + SP_SVG + YT_SVG + '</div>';
    html += '</div>';
  });

  document.getElementById('pl-tracks').innerHTML = html;

  // Wire up icon clicks and art clicks
  document.querySelectorAll('#pl-tracks .track').forEach(function(track) {
    var icons = track.querySelector('.icons');
    var spUrl = icons.getAttribute('data-sp');
    var ytUrl = icons.getAttribute('data-yt');
    track.querySelector('.sp-icon').addEventListener('click', function(e){ e.stopPropagation(); window.open(spUrl,'_blank'); });
    track.querySelector('.yt-icon').addEventListener('click', function(e){ e.stopPropagation(); window.open(ytUrl,'_blank'); });
    var art = track.querySelector('.art');
    art.addEventListener('click', function(e){ e.stopPropagation(); window.open(spUrl,'_blank'); });
  });

  // Lazy load album art + release date via iTunes (batched to avoid rate limiting)
  var trackEls = Array.from(document.querySelectorAll('#pl-tracks .track'));

  function fetchTrackData(trackEl, track) {
    var img = trackEl.querySelector('.art');
    var tc = trackEl.querySelector('.tc');
    var q = encodeURIComponent(track.title + ' ' + track.artist);
    return fetch('https://itunes.apple.com/search?term=' + q + '&media=music&entity=song&limit=1')
      .then(function(r){ return r.json(); })
      .then(function(d){
        if (d.results && d.results[0]) {
          var result = d.results[0];
          if (img) img.src = result.artworkUrl100.replace('100x100bb','200x200bb');
          if (tc && result.releaseDate) {
            var rd = new Date(result.releaseDate);
            tc.setAttribute('data-ry', rd.getFullYear());
            tc.setAttribute('data-rm', rd.getMonth() + 1);
            tc.textContent = calcAgeText(track.date, rd.getFullYear(), rd.getMonth() + 1);
          } else if (tc) {
            tc.setAttribute('data-ry', '');
            tc.setAttribute('data-rm', '');
            var bd = getBdayParts();
            var ld = new Date(track.date);
            var age = ld.getFullYear() - bd.year;
            if ((ld.getMonth()+1) < bd.month || ((ld.getMonth()+1) === bd.month && ld.getDate() < bd.day)) age--;
            tc.textContent = 'Your first listen was at age ' + age + '.';
          }
        }
      }).catch(function(){
        var tc = trackEl.querySelector('.tc');
        if (tc) {
          tc.setAttribute('data-ry', '');
          tc.setAttribute('data-rm', '');
          var bd = getBdayParts();
          var ld = new Date(track.date);
          var age = ld.getFullYear() - bd.year;
          if ((ld.getMonth()+1) < bd.month || ((ld.getMonth()+1) === bd.month && ld.getDate() < bd.day)) age--;
          tc.textContent = 'Your first listen was at age ' + age + '.';
        }
      });
  }

  // Process in batches of 5, with 300ms between batches
  var batchSize = 5;
  var delay = 300;
  function processBatch(startIdx) {
    var batch = trackEls.slice(startIdx, startIdx + batchSize);
    if (batch.length === 0) return;
    var promises = batch.map(function(el, j) {
      return fetchTrackData(el, p.tracks[startIdx + j]);
    });
    Promise.all(promises).then(function() {
      setTimeout(function() { processBatch(startIdx + batchSize); }, delay);
    });
  }
  processBatch(0);
}

// Search
document.getElementById('search').addEventListener('input', function() {
  var q = this.value.toLowerCase().trim();
  var tracks = document.querySelectorAll('#pl-tracks .track');
  var lastHdr = null;
  var visible = 0;
  tracks.forEach(function(t) {
    var prev = t.previousElementSibling;
    var match = !q || t.getAttribute('data-title').includes(q) || t.getAttribute('data-artist').includes(q);
    t.style.display = match ? '' : 'none';
    if (match) visible++;
  });
  // hide day headers with no visible tracks
  document.querySelectorAll('#pl-tracks .day-hdr').forEach(function(hdr) {
    var next = hdr.nextElementSibling;
    var hasVisible = false;
    while (next && !next.classList.contains('day-hdr')) {
      if (next.style.display !== 'none') hasVisible = true;
      next = next.nextElementSibling;
    }
    hdr.style.display = hasVisible ? '' : 'none';
  });
  document.getElementById('no-results').style.display = visible ? 'none' : 'block';
});

bdayInput.value = BIRTHDAY;
bdayInput.addEventListener('change', function() {
  saveBirthday(this.value);
  // Re-render all visible context lines
  document.querySelectorAll('#pl-tracks .tc').forEach(function(tc) {
    var listenDate = tc.getAttribute('data-listen');
    var ry = tc.getAttribute('data-ry');
    var rm = tc.getAttribute('data-rm');
    if (!listenDate) return;
    if (ry && rm) {
      tc.textContent = calcAgeText(listenDate, parseInt(ry), parseInt(rm));
    } else if (ry !== null) {
      // release data fetched but empty — fallback
      var bd = getBdayParts();
      var ld = new Date(listenDate);
      var age = ld.getFullYear() - bd.year;
      if ((ld.getMonth()+1) < bd.month || ((ld.getMonth()+1) === bd.month && ld.getDate() < bd.day)) age--;
      tc.textContent = 'Your first listen was at age ' + age + '.';
    }
    // if ry is null, iTunes hasn't returned yet — it will use updated BIRTHDAY when it does
  });
});
